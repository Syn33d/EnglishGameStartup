<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Startup Project</title>
    <style>
      :root {
        --cyan: #15bae4;
        --dark: #1d1d1b;
        --purple: #420039;
        --orange: #eb4511;
        --light: #f2f2f2;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes successGlow {
        0%,
        100% {
          box-shadow: 0 12px 40px rgba(29, 29, 27, 0.08);
        }
        50% {
          box-shadow: 0 12px 40px rgba(21, 186, 228, 0.45);
        }
      }

      @keyframes failureShake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-8px);
        }
        40% {
          transform: translateX(8px);
        }
        60% {
          transform: translateX(-5px);
        }
        80% {
          transform: translateX(5px);
        }
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--light);
        color: var(--dark);
        font-family: "Poppins", system-ui, sans-serif;
        padding: 2rem;
      }

      .logo {
        width: 220px;
        margin-bottom: 3rem;
        animation: fadeSlideIn 0.6s ease both;
      }

      #card {
        max-width: 560px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
        align-items: center;
        text-align: center;
        background: #fff;
        border-radius: 20px;
        padding: 3rem 2.5rem;
        border-top: 6px solid var(--cyan);
        box-shadow: 0 12px 40px rgba(29, 29, 27, 0.08);
        transition: border-color 0.2s ease;
        animation: fadeSlideIn 0.6s ease 0.15s both;
      }

      #card.success {
        border-top-color: var(--cyan);
        animation:
          fadeSlideIn 0.5s ease both,
          successGlow 2.4s ease 0.5s infinite;
      }

      #card.failure {
        border-top-color: var(--orange);
        animation:
          fadeSlideIn 0.4s ease both,
          failureShake 0.5s ease 0.3s;
      }

      /* ── Report ─────────────────────────────────────────── */
      #report {
        max-width: 560px;
        width: 100%;
        margin-top: 3rem;
        display: none;
        flex-direction: column;
        gap: 0.6rem;
      }
      #report.visible {
        display: flex;
        animation: fadeSlideIn 0.5s ease 0.6s both;
      }
      .report-title {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--purple);
        margin-bottom: 0.4rem;
      }
      .decision {
        border: 1px solid rgba(29, 29, 27, 0.12);
        border-radius: 12px;
        background: #fff;
        padding: 0.85rem 1.1rem;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .decision-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
      }
      .decision-label {
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--dark);
      }
      .decision-choice {
        font-size: 0.95rem;
        color: rgba(29, 29, 27, 0.55);
      }
      .decision-choice strong {
        color: var(--dark);
      }
      .verdict-good {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: var(--cyan);
      }
      .verdict-bad {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: var(--orange);
      }
      .verdict-mixed {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: var(--purple);
      }
      .decision-why {
        font-size: 0.82rem;
        color: rgba(29, 29, 27, 0.65);
        line-height: 1.65;
        margin-top: 0.15rem;
      }

      #text {
        font-size: 1.25rem;
        line-height: 1.8;
        color: var(--dark);
        min-height: 5rem;
      }

      #text.anim {
        animation: fadeSlideIn 0.4s ease both;
      }

      #buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1.5rem;
      }

      #buttons.anim-d {
        animation: fadeSlideIn 0.4s ease 0.15s both;
      }

      button {
        padding: 0.85rem 2.5rem;
        font-size: 1rem;
        font-family: inherit;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: var(--dark);
        background: var(--cyan);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s,
          transform 0.15s;
      }

      button:hover {
        background: var(--purple);
        color: var(--light);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/logo.svg" alt="Startup Project" />
    <div id="card">
      <p id="text"></p>
      <div id="buttons"></div>
    </div>
    <div id="report"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
