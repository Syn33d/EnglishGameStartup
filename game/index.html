<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startup Project</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        color: #e8e0d0;
        font-family: Georgia, 'Times New Roman', serif;
        padding: 2rem;
      }

      h1 {
        font-size: 1rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #665544;
        margin-bottom: 3rem;
      }

      #card {
        max-width: 560px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
        align-items: center;
        text-align: center;
      }

      #text {
        font-size: 1.25rem;
        line-height: 1.8;
        color: #d4c9b8;
        min-height: 5rem;
      }

      #buttons {
        display: flex;
        gap: 1.5rem;
      }

      button {
        padding: 0.75rem 2.5rem;
        font-size: 1rem;
        font-family: inherit;
        letter-spacing: 0.08em;
        background: transparent;
        color: #e8e0d0;
        border: 1px solid #554433;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }

      button:hover {
        background: #554433;
        color: #fff;
        border-color: #776655;
      }

      #card.success { border-top: 2px solid #3a7a3a; padding-top: 1.5rem; }
      #card.failure { border-top: 2px solid #7a2a2a; padding-top: 1.5rem; }
    </style>
  </head>
  <body>
    <h1>Startup Project</h1>
    <div id="card">
      <p id="text"></p>
      <div id="buttons"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
